services:
  - type: web
    name: ai-job-alerts-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    branch: main
    buildCommand: npm ci
    startCommand: npm run start
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: "<ADD_YOUR_DATABASE_URL>"
      - key: JWT_ACCESS_SECRET
        value: "<ADD_JWT_ACCESS_SECRET>"
      - key: JWT_REFRESH_SECRET
        value: "<ADD_JWT_REFRESH_SECRET>"
      - key: REDIS_HOST
        value: "<ADD_REDIS_HOST>"
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: CLIENT_URL
        value: "https://your-frontend-url"
      - key: PORT
        value: "5000"

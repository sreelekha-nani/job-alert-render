version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mongodb://mongo:27017/ai_job_alerts
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Add other environment variables from .env.example here for development
      - JWT_SECRET=your-super-secret-key
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
